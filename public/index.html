<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cf-proxy-panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="src/store/profiles.js"></script>
</head>
<body class="min-h-screen bg-zinc-100 text-zinc-950">
  <div id="app" class="mx-auto min-h-screen w-full max-w-7xl px-4 py-6 sm:px-6 lg:px-8"></div>

  <script type="text/x-template" id="app-template">
    <main class="space-y-5">
      <section class="flex flex-col gap-4 border-b border-zinc-200 pb-5 md:flex-row md:items-end md:justify-between">
        <div>
          <h1 class="text-3xl font-semibold tracking-normal text-zinc-950">cf-proxy-panel</h1>
          <p class="mt-2 text-sm text-zinc-600">Cloudflare Workers 上的节点管理面板，支持一键安装、自动推送管理和快速导出。</p>
        </div>
        <div v-if="authed" class="flex flex-wrap items-center gap-2 text-sm">
          <span class="rounded-md bg-white px-3 py-2 text-zinc-700 ring-1 ring-zinc-200">共 {{ profiles.length }} 条，启用 {{ enabledCount }} 条</span>
          <button @click="exportDb" class="rounded-md border border-zinc-300 bg-white px-3 py-2 font-medium text-zinc-700 hover:bg-zinc-50">备份</button>
          <button @click="openImportPicker" class="rounded-md border border-zinc-300 bg-white px-3 py-2 font-medium text-zinc-700 hover:bg-zinc-50">恢复</button>
          <button @click="lock" class="rounded-md border border-zinc-300 bg-white px-3 py-2 font-medium text-zinc-700 hover:bg-zinc-50">重新验证</button>
          <input ref="importFileInput" type="file" accept="application/json,.json" class="hidden" @change="importDb">
        </div>
      </section>

      <section v-if="!authed" class="mx-auto mt-12 max-w-xl rounded-lg bg-white p-8 shadow-sm ring-1 ring-zinc-200">
        <h2 class="text-2xl font-semibold text-zinc-950">访问验证</h2>
        <p class="mt-3 text-base leading-7 text-zinc-600">请输入管理员访问令牌。系统会使用该令牌访问管理接口，并在生成订阅地址时附带校验参数。</p>
        <div class="mt-6 flex flex-col gap-3 sm:flex-row">
          <input v-model="tokenInput" @keyup.enter="unlock" type="password" autocomplete="current-password" class="min-h-12 flex-1 rounded-md border border-zinc-300 px-4 text-base outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" placeholder="请输入访问令牌">
          <button @click="unlock" class="min-h-12 rounded-md bg-emerald-600 px-6 text-base font-semibold text-white hover:bg-emerald-700">验证进入</button>
        </div>
      </section>

      <template v-else>
        <section class="grid gap-4 xl:grid-cols-[minmax(0,1fr)_420px_320px]">
          <div class="rounded-lg bg-white p-4 shadow-sm ring-1 ring-zinc-200">
            <h2 class="text-base font-semibold text-zinc-950">添加订阅</h2>
            <div class="mt-4 grid gap-3 md:grid-cols-[180px_minmax(0,1fr)]">
              <input v-model="draftAlias" class="min-h-11 rounded-md border border-zinc-300 px-3 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" placeholder="名称">
              <input v-model="draftUrl" @keyup.enter="addNewProfile" class="min-h-11 rounded-md border border-zinc-300 px-3 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" placeholder="vmess:// 或 vless:// 链接">
            </div>
            <button @click="addNewProfile" :disabled="loading || !canAdd" class="mt-3 min-h-11 w-full rounded-md bg-zinc-950 px-5 text-sm font-semibold text-white hover:bg-zinc-800 disabled:cursor-not-allowed disabled:bg-zinc-300">添加</button>
          </div>

          <div class="rounded-lg bg-white p-4 shadow-sm ring-1 ring-zinc-200">
            <div class="flex items-center justify-between gap-3">
              <h2 class="text-base font-semibold text-zinc-950">规则设置</h2>
              <button @click="openAdvancedRules" class="rounded-md border border-zinc-300 bg-white px-3 py-2 text-sm font-medium text-zinc-700 hover:bg-zinc-50">高级设置</button>
            </div>
            <input v-model="settings.remoteRuleUrl" class="mt-4 min-h-10 w-full rounded-md border border-zinc-300 px-3 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" placeholder="https://raw.githubusercontent.com/ACL4SSR/...">
            <button @click="saveSystemSettings" class="mt-3 w-full rounded-md bg-zinc-950 px-3 py-2 text-sm font-semibold text-white hover:bg-zinc-800">保存</button>
            <p v-if="extraRuleCount" class="mt-2 text-xs text-zinc-500">已配置 {{ extraRuleCount }} 个高级规则组，导出 Clash 时优先匹配。</p>
          </div>

          <div class="rounded-lg bg-white p-4 shadow-sm ring-1 ring-zinc-200 xl:order-last">
            <h2 class="text-base font-semibold text-zinc-950">导出</h2>
            <div class="mt-4 grid grid-cols-2 rounded-md bg-zinc-100 p-1">
              <button @click="exportTarget = 'clash'" :class="exportTarget === 'clash' ? 'bg-white text-zinc-950 shadow-sm' : 'text-zinc-600'" class="rounded px-3 py-2 text-sm font-medium">Clash</button>
              <button @click="exportTarget = 'v2ray'" :class="exportTarget === 'v2ray' ? 'bg-white text-zinc-950 shadow-sm' : 'text-zinc-600'" class="rounded px-3 py-2 text-sm font-medium">V2Ray</button>
            </div>
            <button @click="copyAllLinks" class="mt-3 w-full rounded-md bg-emerald-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-emerald-700">复制合并订阅</button>
          </div>
        </section>

        <section class="rounded-lg bg-white p-4 shadow-sm ring-1 ring-zinc-200">
          <div class="flex flex-col gap-3 md:flex-row md:items-start md:justify-between">
            <div>
              <h2 class="text-base font-semibold text-zinc-950">{{ installModeLabel }} 一键安装</h2>
              <p class="mt-1 text-sm text-zinc-600">命令已自动填入当前 Web 地址和访问令牌，节点名称默认使用服务器 hostname，安装完成后自动推送到面板。</p>
            </div>
            <div class="flex flex-wrap gap-2">
              <button @click="openInstallSettings" class="min-h-10 rounded-md border border-zinc-300 bg-white px-4 text-sm font-semibold text-zinc-700 hover:bg-zinc-50">高级设置</button>
              <button @click="copyInstallCommand" class="min-h-10 rounded-md bg-zinc-950 px-5 text-sm font-semibold text-white hover:bg-zinc-800">复制命令</button>
            </div>
          </div>
          <pre class="mt-3 overflow-auto rounded-md bg-zinc-950 p-3 text-sm leading-6 text-zinc-100 whitespace-nowrap"><code>{{ installCommand }}</code></pre>
        </section>

        <section class="overflow-hidden rounded-lg bg-white shadow-sm ring-1 ring-zinc-200">
          <div class="flex flex-wrap items-center justify-between gap-3 border-b border-zinc-200 px-4 py-3">
            <h2 class="text-base font-semibold text-zinc-950">订阅列表</h2>
            <span v-if="loading" class="text-sm text-zinc-500">加载中...</span>
          </div>

          <div class="overflow-x-auto">
            <table class="w-full min-w-[1120px] table-fixed border-collapse text-sm">
              <thead class="bg-zinc-50 text-left text-xs font-semibold uppercase tracking-normal text-zinc-500">
                <tr>
                  <th class="w-20 px-4 py-3">启用</th>
                  <th class="w-60 px-4 py-3">名称</th>
                  <th class="px-4 py-3">链接</th>
                  <th class="w-48 px-4 py-3">更新时间</th>
                  <th class="w-64 px-4 py-3">操作</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-zinc-100">
                <tr v-if="profiles.length === 0">
                  <td colspan="5" class="px-4 py-10 text-center text-zinc-500">暂无订阅，请先添加。</td>
                </tr>
                <tr v-for="profile in profiles" :key="profile.id" class="align-middle hover:bg-zinc-50">
                  <td class="px-4 py-3">
                    <button @click="toggleEnabled(profile)" :class="profile.enabled ? 'bg-emerald-600' : 'bg-zinc-300'" class="relative h-7 w-12 overflow-hidden rounded-full transition-colors" :aria-pressed="profile.enabled">
                      <span :class="profile.enabled ? 'translate-x-5' : 'translate-x-0'" class="absolute left-1 top-1 h-5 w-5 rounded-full bg-white shadow-sm transition-transform"></span>
                    </button>
                  </td>
                  <td class="px-4 py-3">
                    <input v-model="profile.alias" @change="saveProfile(profile)" class="min-h-11 w-full rounded-md border border-zinc-200 bg-white px-3 text-base outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
                  </td>
                  <td class="px-4 py-3">
                    <input v-model="profile.url" @change="saveProfile(profile)" class="min-h-11 w-full rounded-md border border-zinc-200 bg-white px-3 font-mono text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
                  </td>
                  <td class="px-4 py-3 text-sm text-zinc-600 whitespace-nowrap">{{ formattedTime(profile.updatedAt) }}</td>
                  <td class="px-4 py-3">
                    <div class="flex flex-nowrap items-center gap-2 whitespace-nowrap">
                      <button @click="saveProfile(profile)" :disabled="savingId === profile.id" class="min-w-16 rounded-md border border-zinc-300 bg-white px-3 py-2 text-sm font-medium text-zinc-700 hover:bg-zinc-50 disabled:opacity-50">{{ savingId === profile.id ? '保存中' : '保存' }}</button>
                      <button @click="copyProfileLink(profile)" class="min-w-16 rounded-md border border-zinc-300 bg-white px-3 py-2 text-sm font-medium text-zinc-700 hover:bg-zinc-50">导出</button>
                      <button @click="deleteProf(profile)" class="min-w-16 rounded-md bg-red-50 px-3 py-2 text-sm font-medium text-red-700 hover:bg-red-100">删除</button>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </template>

      <div v-if="installSettingsOpen" class="fixed inset-0 z-30 flex items-center justify-center bg-black/40 px-4 py-6">
        <section class="max-h-[88vh] w-full max-w-2xl overflow-hidden rounded-lg bg-white shadow-xl ring-1 ring-zinc-200">
          <div class="flex items-center justify-between border-b border-zinc-200 px-5 py-4">
            <div>
              <h2 class="text-lg font-semibold text-zinc-950">安装高级设置</h2>
              <p class="mt-1 text-sm text-zinc-500">选择 Reality 或 WSS。WSS 会自动配置 Cloudflare DNS、TLS 证书、Nginx 反代和 VMess WebSocket。</p>
            </div>
            <button @click="closeInstallSettings" class="rounded-md border border-zinc-300 bg-white px-3 py-2 text-sm font-medium text-zinc-700 hover:bg-zinc-50">关闭</button>
          </div>

          <div class="space-y-4 px-5 py-4">
            <div class="grid grid-cols-2 rounded-md bg-zinc-100 p-1">
              <button @click="installDraft.mode = 'reality'" :class="installDraft.mode === 'reality' ? 'bg-white text-zinc-950 shadow-sm' : 'text-zinc-600'" class="rounded px-3 py-2 text-sm font-medium">Reality</button>
              <button @click="installDraft.mode = 'wss'" :class="installDraft.mode === 'wss' ? 'bg-white text-zinc-950 shadow-sm' : 'text-zinc-600'" class="rounded px-3 py-2 text-sm font-medium">WSS</button>
            </div>

            <div v-if="installDraft.mode === 'reality'" class="grid gap-3 sm:grid-cols-2">
              <input v-model="installDraft.realityPort" class="min-h-10 rounded-md border border-zinc-300 px-3 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" placeholder="Reality 端口，默认 443">
              <input v-model="installDraft.realitySni" class="min-h-10 rounded-md border border-zinc-300 px-3 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" placeholder="Reality SNI，默认 www.amazon.com">
            </div>

            <div v-else class="space-y-3">
              <input v-model="installDraft.cfToken" type="password" class="min-h-10 w-full rounded-md border border-zinc-300 px-3 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" placeholder="Cloudflare API Token">
              <div class="grid gap-3 sm:grid-cols-2">
                <input v-model="installDraft.rootDomain" class="min-h-10 rounded-md border border-zinc-300 px-3 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" placeholder="主域名，例如 example.com">
                <input v-model="installDraft.wssDomain" class="min-h-10 rounded-md border border-zinc-300 px-3 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" placeholder="WSS 域名，留空使用 IP.主域名">
              </div>
              <div class="grid gap-3 sm:grid-cols-2">
                <input v-model="installDraft.cfZoneId" class="min-h-10 rounded-md border border-zinc-300 px-3 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" placeholder="Cloudflare Zone ID，推荐填写">
                <input v-model="installDraft.cfAccountId" class="min-h-10 rounded-md border border-zinc-300 px-3 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" placeholder="Account ID，可选">
              </div>
              <div class="grid gap-3 sm:grid-cols-2">
                <input v-model="installDraft.wssPort" class="min-h-10 rounded-md border border-zinc-300 px-3 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" placeholder="外部 TLS 端口，默认 443">
                <input v-model="installDraft.wssPath" class="min-h-10 rounded-md border border-zinc-300 px-3 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" placeholder="WS 路径，留空随机生成">
              </div>
              <p class="text-xs leading-5 text-zinc-500">用户级 DNS Token 推荐同时填写 Zone ID。若 Token 没有 DNS Read，脚本会跳过查询并直接尝试创建 A 记录。</p>
            </div>
          </div>

          <div class="flex flex-col gap-2 border-t border-zinc-200 px-5 py-4 sm:flex-row sm:justify-end">
            <button @click="closeInstallSettings" class="rounded-md border border-zinc-300 bg-white px-4 py-2 text-sm font-medium text-zinc-700 hover:bg-zinc-50">取消</button>
            <button @click="saveInstallSettings" class="rounded-md bg-zinc-950 px-4 py-2 text-sm font-semibold text-white hover:bg-zinc-800">保存设置</button>
          </div>
        </section>
      </div>

      <div v-if="advancedRulesOpen" class="fixed inset-0 z-30 flex items-center justify-center bg-black/40 px-4 py-6">
        <section class="max-h-[88vh] w-full max-w-3xl overflow-hidden rounded-lg bg-white shadow-xl ring-1 ring-zinc-200">
          <div class="flex items-center justify-between border-b border-zinc-200 px-5 py-4">
            <div>
              <h2 class="text-lg font-semibold text-zinc-950">高级规则设置</h2>
              <p class="mt-1 text-sm text-zinc-500">每个规则组按“规则组名称 + 规则内容”保存，内容使用 Clash classical 列表格式。</p>
            </div>
            <button @click="closeAdvancedRules" class="rounded-md border border-zinc-300 bg-white px-3 py-2 text-sm font-medium text-zinc-700 hover:bg-zinc-50">关闭</button>
          </div>

          <div class="max-h-[60vh] space-y-4 overflow-y-auto px-5 py-4">
            <div v-for="(group, index) in editingRuleGroups" :key="index" class="rounded-lg border border-zinc-200 p-4">
              <div class="flex flex-col gap-3 sm:flex-row">
                <input v-model="group.name" class="min-h-10 flex-1 rounded-md border border-zinc-300 px-3 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" placeholder="规则组名称，例如：直连 / 代理 / 拦截">
                <button @click="removeExtraRuleGroup(index)" class="rounded-md bg-red-50 px-3 py-2 text-sm font-medium text-red-700 hover:bg-red-100">删除</button>
              </div>
              <textarea v-model="group.content" rows="7" class="mt-3 w-full resize-y rounded-md border border-zinc-300 px-3 py-2 font-mono text-sm leading-6 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" placeholder="# 支持注释&#10;DOMAIN-SUFFIX,example.com&#10;IP-CIDR,192.168.0.0/16,no-resolve"></textarea>
            </div>
            <button @click="addExtraRuleGroup" class="w-full rounded-md border border-dashed border-zinc-300 bg-zinc-50 px-4 py-3 text-sm font-semibold text-zinc-700 hover:bg-zinc-100">添加规则组</button>
          </div>

          <div class="flex flex-col gap-2 border-t border-zinc-200 px-5 py-4 sm:flex-row sm:justify-end">
            <button @click="closeAdvancedRules" class="rounded-md border border-zinc-300 bg-white px-4 py-2 text-sm font-medium text-zinc-700 hover:bg-zinc-50">取消</button>
            <button @click="saveAdvancedRules" class="rounded-md bg-zinc-950 px-4 py-2 text-sm font-semibold text-white hover:bg-zinc-800">保存高级设置</button>
          </div>
        </section>
      </div>

      <footer class="border-t border-zinc-200 pt-4 text-center text-xs text-zinc-500">
        cf-proxy-panel by vpslog &middot; <a :href="projectRepoUrl" target="_blank" rel="noreferrer" class="font-medium text-zinc-700 hover:text-zinc-950">GitHub</a>
      </footer>

      <div v-if="notice || error" class="fixed bottom-5 left-1/2 z-40 -translate-x-1/2 rounded-md px-4 py-3 text-sm font-medium shadow-lg" :class="error ? 'bg-red-600 text-white' : 'bg-zinc-950 text-white'">
        {{ error || notice }}
      </div>
    </main>
  </script>
  <script src="src/main.js"></script>
</body>
</html>
